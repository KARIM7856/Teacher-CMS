# Supabase local config. If your CLI version expects a different shape, run
# `supabase init` to regenerate, then keep the [db.seed] block below.
project_id = "teacher-cms"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
# Local dev convenience: don't require email confirmation for seeded/dev users.
[auth.email]
enable_confirmations = false
